packages:
  "react-markdown": "Render Markdown content for AI responses"
  "remark-gfm": "GitHub Flavored Markdown support for tables and lists in responses"
  "framer-motion": "Smooth animations for chat bubbles, sidebar, and layout transitions"
  "date-fns": "Human-readable date formatting for conversations and documents"
  "react-dropzone": "Drag-and-drop file upload for the Knowledge Base"
  "react-textarea-autosize": "Auto-resizing text area for the chat input"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to cleanly merge Tailwind CSS classes"

images:
  - path: "artifacts/company-ai/public/images/logo.png"
    description: "Sleek, minimalist 3D geometric orb glowing with deep purple and blue light, dark background, suitable for a premium AI assistant app icon"
    aspect_ratio: "1:1"
  - path: "artifacts/company-ai/public/images/welcome-bg.png"
    description: "Subtle, dark, professional abstract gradient mesh background with deep navy, charcoal, and soft neon purple light leaks, ultra-premium corporate feel"
    aspect_ratio: "16:9"

notes:
  - Using generated hooks from @workspace/api-client-react for standard CRUD operations
  - Implementing custom fetch hook with ReadableStream for SSE streaming chat responses
  - Wouter is used for routing; Links use class names directly without nested <a> tags
