kind = "web"
previewPath = "/"
title = "CrowdLens · Campus AI"
version = "1.0.0"
id = "artifacts/company-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/", "/api", "/ws" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/company-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/company-ai", "run", "build" ]
publicDir = "artifacts/company-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
